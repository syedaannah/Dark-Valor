<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Panel — Dark Valor</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="theme.js"></script>
  <style>
    .admin-table{width:100%;border-collapse:collapse;font-family:var(--body);font-size:14px;}
    .admin-table th{font-family:var(--head);font-size:11px;letter-spacing:2px;color:var(--gold);padding:12px;text-align:left;background:#150400;}
    .admin-table td{padding:11px 12px;border-bottom:1px solid rgba(106,24,8,.2);color:var(--muted);}
    .admin-table tr:hover td{background:rgba(232,35,10,.04);}
    .admin-table td:first-child{color:var(--text);}
    .badge-paid{color:#4cff4c;font-size:11px;}
    .act-btn{font-family:var(--head);font-size:10px;letter-spacing:1px;padding:4px 10px;border:1px solid;cursor:pointer;background:none;transition:.2s;}
    .act-btn.edit{color:var(--gold);border-color:rgba(201,162,39,.4);}
    .act-btn.edit:hover{background:rgba(201,162,39,.1);}
    .act-btn.del{color:var(--red);border-color:rgba(232,35,10,.4);}
    .act-btn.del:hover{background:rgba(232,35,10,.1);}
    #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
    #modal-overlay.open{display:flex;}
    #modal-box{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--gold);padding:28px;width:420px;max-width:95vw;}
    .stat-bar{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:32px;}
    .stat-bar .stat{flex:1;min-width:120px;}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">
    <span class="logo-top">Dark Valor</span>
    <span class="logo-bot">Admin Panel</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="register.html">Register</a></li>
    <li><a href="admin.html" class="active">Admin</a></li>
  </ul>
</nav>

<div class="page">
  <div class="sec-head">
    <div class="sec-tag">Admin Authority</div>
    <h2 class="sec-title">Registration <span>Management</span></h2>
    <div class="sec-line"></div>
  </div>

  <!-- Stats -->
  <div class="stat-bar" id="stats-bar"></div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Name</th><th>Email</th><th>Fighter</th><th>Tournament</th>
          <th>Power</th><th>Payment</th><th>Status</th><th>Date</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="reg-tbody"><tr><td colspan="9" style="text-align:center;padding:30px;color:var(--muted);">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Edit Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h3 style="font-family:var(--head);letter-spacing:3px;color:var(--gold);margin-bottom:20px;font-size:13px;">EDIT REGISTRATION</h3>
    <input type="hidden" id="m-id"/>
    <div class="form-group"><label>Name</label><input id="m-name"/></div>
    <div class="form-group"><label>Email</label><input id="m-email"/></div>
    <div class="form-group"><label>Tournament</label>
      <select id="m-tournament">
        <option>Season IV — Open Tournament</option>
        <option>Grand Championship</option>
        <option>Faction War — Legion vs Heralds</option>
      </select>
    </div>
    <div class="form-group"><label>Payment Status</label>
      <select id="m-pstatus"><option>Paid</option><option>Pending</option><option>Failed</option></select>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn-submit" id="m-save" style="padding:10px 24px;">Save</button>
      <button class="btn-submit" id="m-cancel" style="padding:10px 24px;background:transparent;color:var(--muted);border-color:var(--border);">Cancel</button>
    </div>
  </div>
</div>

<footer>
  <div class="footer-name">Dark Valor: Arena</div>
  <p>© 2025 <span>Grand Tournament</span> · All Rights Reserved</p>
</footer>

<script>
const API = "https://dark-valor-production.up.railway.app/registrations";

async function loadAll() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    renderStats(data);
    renderTable(data);
  } catch { document.getElementById("reg-tbody").innerHTML = `<tr><td colspan="9" style="text-align:center;color:var(--red);padding:30px;">⚠️ Cannot connect to server. Run: cd backend && npm start</td></tr>`; }
}

function renderStats(data) {
  const total = data.length;
  const paid = data.filter(d => d.paymentStatus === "Paid").length;
  const revenue = paid * 10;
  document.getElementById("stats-bar").innerHTML = `
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total Registrations</div></div>
    <div class="stat"><div class="stat-n">${paid}</div><div class="stat-l">Paid</div></div>
    <div class="stat"><div class="stat-n">$${revenue}</div><div class="stat-l">Revenue</div></div>
    <div class="stat"><div class="stat-n">${total - paid}</div><div class="stat-l">Pending</div></div>`;
}

function renderTable(data) {
  if (!data.length) { document.getElementById("reg-tbody").innerHTML = `<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--muted);">No registrations yet.</td></tr>`; return; }
  document.getElementById("reg-tbody").innerHTML = data.map(d => `
    <tr>
      <td>${d.name}</td>
      <td>${d.email}</td>
      <td>${d.fighter}</td>
      <td>${d.tournament}</td>
      <td>${d.powerLevel}</td>
      <td>${d.paymentMethod}</td>
      <td class="${d.paymentStatus==='Paid'?'badge-paid':''}">${d.paymentStatus}</td>
      <td>${new Date(d.createdAt).toLocaleDateString()}</td>
      <td style="display:flex;gap:6px;">
        <button class="act-btn edit" onclick="openEdit('${d._id}','${d.name}','${d.email}','${d.tournament}','${d.paymentStatus}')">Edit</button>
        <button class="act-btn del" onclick="delReg('${d._id}')">Delete</button>
      </td>
    </tr>`).join("");
}

function openEdit(id, name, email, tournament, pstatus) {
  document.getElementById("m-id").value = id;
  document.getElementById("m-name").value = name;
  document.getElementById("m-email").value = email;
  document.getElementById("m-tournament").value = tournament;
  document.getElementById("m-pstatus").value = pstatus;
  document.getElementById("modal-overlay").classList.add("open");
}

document.getElementById("m-cancel").onclick = () => document.getElementById("modal-overlay").classList.remove("open");

document.getElementById("m-save").onclick = async () => {
  const id = document.getElementById("m-id").value;
  const body = {
    name: document.getElementById("m-name").value,
    email: document.getElementById("m-email").value,
    tournament: document.getElementById("m-tournament").value,
    paymentStatus: document.getElementById("m-pstatus").value
  };
  await fetch(`${API}/${id}`, { method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  document.getElementById("modal-overlay").classList.remove("open");
  loadAll();
};

async function delReg(id) {
  if (!confirm("Delete this registration?")) return;
  await fetch(`${API}/${id}`, { method:"DELETE" });
  loadAll();
}

loadAll();
</script>
</body>
</html>
